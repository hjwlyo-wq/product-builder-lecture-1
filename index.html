<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Look Test & Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle">Dark Mode</button>
        
        <section class="animal-test-section">
            <h1>Animal Look AI Test</h1>
            <p class="subtitle">Upload your photo to find out your animal twin!</p>
            
            <div class="upload-container" id="drop-area">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <div class="upload-icon">📸</div>
                <p>Drag & Drop or Click to Upload</p>
                <button id="upload-btn">Select Photo</button>
            </div>

            <div id="image-preview-container" style="display: none;">
                <img id="image-preview" src="#" alt="Your photo">
            </div>

            <div id="loading" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing your features...</p>
            </div>

            <div id="result-container"></div>
            
            <div class="recent-results" id="recent-animal-results" style="display: none;">
                <h3>Recent Animal Tests</h3>
                <ul id="animal-history-list"></ul>
            </div>
        </section>

        <hr class="section-divider">

        <section class="lotto-section">
            <h2>Lotto Number Generator</h2>
            <div class="lotto-numbers">
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
            </div>
            <button id="generate-btn" class="btn-primary">Generate Lucky Numbers</button>
            <div class="history-container">
                <h3>Previous Draws</h3>
                <ul id="previous-draws"></ul>
            </div>
        </section>

        <section class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mdalvpob" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="btn-secondary">Send Message</button>
            </form>
        </section>

        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder1-5.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
